<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 3: ABM de Libros</title>
    <style>#errorForm { color: rgba(255, 0, 0, 0.795); }</style>
</head>
<body>
    <h1>Gestión de Catálogo</h1>
    
    <section>
        <h3>Agregar Libro</h3>
        <input type="text" id="titulo" placeholder="Título">
        <input type="text" id="autor" placeholder="Autor">
        <input type="number" id="precio" placeholder="Precio">
        <label><input type="checkbox" id="disponible" checked> Disponible</label>
        <button id="btnAgregar">Agregar Libro</button>
        <div id="errorForm"></div>
    </section>

    <hr>

    <section>
        <input type="text" id="filtroAutor" placeholder="Filtrar por autor">
        <button id="filtrar">Filtrar</button>
        <button id="mostrarTodos">Ver todos</button>
    </section>

    <ul id="lista"></ul>
    <p id="stats"></p>

    <script src="app.js"></script>
</body>
</html>
